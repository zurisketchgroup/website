<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuri Sketch - English Sketch Comedy in Zurich</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <a href="https://zurisket.ch" class="logo">
                <img src="/images/zuri-sketch-logo.svg" />
            </a>
            <h1>Zuri Sketch</h1>
            <p>Live English Sketch Comedy Show in Zürich</p>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Next Show Section -->
        <section id="next-show" class="next-show-section">
            <div class="section-content">
                <h2>Back this autumn!</h2>
                <p>Stay tuned for the next show date!</p>
            </div>
        </section>

        <!-- Social Media Section -->
        <section id="social" class="social-media-section">
            <div class="section-content">
                <h2>In the meantime - check our videos:</h2>
                <div class="social-links">
                    <a href="https://www.instagram.com/zuri.sketch" target="_blank" class="social-link instagram">
                        <img src="/images/instagram-logo.svg" />
                        Instagram
                    </a>
                    <a href="http://youtube.com/@zuri.sketch" target="_blank" class="social-link youtube">
                         <img src="/images/youtube-logo.svg" />
                        YouTube
                    </a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
